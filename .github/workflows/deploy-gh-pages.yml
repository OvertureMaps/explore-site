---
# Production Deployment Workflow
#
# Triggered on: push to main
# Jobs:
#   - build:  Installs dependencies, runs tests, builds the site, and uploads a Pages artifact
#   - deploy: Deploys the artifact to GitHub Pages via OIDC

name: Production Deployment
run-name: Publish prod site

on:
  push:
    branches: [main]

permissions:
  contents: read # required to checkout the code from the repo

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: package.json

      - name: Configure sustainable npm
        uses: lowlydba/sustainable-npm@31d51025884f424f58f22e4e6578178bb4e79632 # v3.0.0

      - name: Install
        run: |
          npm ci
          npm run postinstall

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: out

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-slim
    needs: build
    permissions:
      pages: write # required to deploy to GitHub Pages
      id-token: write # required to use OIDC authentication
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
